<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAXON FINANCE | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        :root { --bg-color: #0b0e11; --card-bg: #1e2329; --accent: #f0b90b; --text-main: #eaecef; }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b3139; padding-bottom: 10px; margin-bottom: 15px; }
        .timeframes { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tf-btn { background: #2b3139; border: 1px solid #474d57; color: #848e9c; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .tf-btn.active { background: var(--accent); color: black; border-color: var(--accent); font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border-bottom: 2px solid var(--accent); }
        .stat-card h3 { margin: 0; font-size: 11px; color: #848e9c; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; position: relative; margin-bottom: 15px; }
        .form-section { background: var(--card-bg); padding: 20px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #474d57; background: #2b3139; color: white; box-sizing: border-box; }
        .save-btn { background: var(--accent); color: black; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0;">RAXON <span style="color:var(--accent)">FINANCE</span></h2>
        <div style="font-size: 12px; color: var(--accent);">PRO DASHBOARD</div>
    </header>

    <div class="timeframes" id="tf-container">
        <button class="tf-btn" onclick="changeTF(1, this)">1D</button>
        <button class="tf-btn" onclick="changeTF(7, this)">1W</button>
        <button class="tf-btn" onclick="changeTF(14, this)">2W</button>
        <button class="tf-btn" onclick="changeTF(21, this)">3W</button>
        <button class="tf-btn active" onclick="changeTF(30, this)">1M</button>
        <button class="tf-btn" onclick="changeTF(90, this)">3M</button>
        <button class="tf-btn" onclick="changeTF(180, this)">6M</button>
        <button class="tf-btn" onclick="changeTF(365, this)">1Y</button>
        <button class="tf-btn" onclick="changeTF(730, this)">2Y</button>
        <button class="tf-btn" onclick="changeTF(0, this)">ALL</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Wallet</h3><p id="s-wallet">Rs. 0</p></div>
        <div class="stat-card"><h3>Daily P&L</h3><p id="s-income">Rs. 0</p></div>
        <div class="stat-card"><h3>Records</h3><p id="s-days">0 Days</p></div>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px; color:#848e9c">Wallet Equity Curve</h4>
        <canvas id="walletChart"></canvas>
    </div>
    <div class="card">
        <h4 style="margin:0 0 10px; color:#848e9c">Daily Income / Loss</h4>
        <canvas id="incomeChart"></canvas>
    </div>

    <div class="form-section">
        <h3 style="margin:0 0 15px;">Add New Record</h3>
        <input type="date" id="d-date">
        <input type="number" id="d-open" placeholder="Open Balance">
        <input type="number" id="d-close" placeholder="Income (Use - for Loss)">
        <input type="number" id="d-wallet" placeholder="Current Wallet">
        <button class="save-btn" onclick="submitData()">SAVE TO CLOUD</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysgbdmkZn3v59mJaYSnh4N2mqp2zOQ31CnZPprRPys5Hs9R9N0Z-ilt5VO0xPn0Iznjg/exec";
    let rawData = [];
    let wChart, iChart;

    async function loadData() {
        const res = await fetch(SCRIPT_URL);
        rawData = await res.json();
        if(rawData.length > 0) {
            // Default view: 1 Month (30 days)
            changeTF(30, document.querySelector('.tf-btn.active'));
            
            const last = rawData[rawData.length - 1];
            document.getElementById('s-wallet').innerText = "Rs. " + last.wallet.toLocaleString();
            document.getElementById('s-income').innerText = "Rs. " + last.close.toLocaleString();
            document.getElementById('s-income').style.color = last.close >= 0 ? "#00c853" : "#ff3b30";
            document.getElementById('s-days').innerText = rawData.length + " Days";
        }
    }

    function changeTF(days, btn) {
        // Update button UI
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filter data
        let filtered = days === 0 ? rawData : rawData.slice(-days);
        
        const labels = filtered.map(d => d.date.split('T')[0]);
        const wallet = filtered.map(d => parseFloat(d.wallet));
        const income = filtered.map(d => parseFloat(d.close));

        updateCharts(labels, wallet, income);
    }

    function updateCharts(labels, wallet, income) {
        const commonOptions = {
            responsive: true,
            plugins: { zoom: { zoom: { wheel: {enabled: true}, pinch: {enabled: true}, mode: 'x' }, pan: {enabled: true, mode: 'x'} }, legend: {display: false} },
            scales: { y: { grid: { color: '#2b3139' } }, x: { grid: { display: false } } }
        };

        if(wChart) wChart.destroy();
        if(iChart) iChart.destroy();

        wChart = new Chart(document.getElementById('walletChart'), {
            type: 'line',
            data: { labels, datasets: [{ data: wallet, borderColor: '#f0b90b', backgroundColor: 'rgba(240,185,11,0.1)', fill: true, tension: 0.3 }] },
            options: commonOptions
        });

        iChart = new Chart(document.getElementById('incomeChart'), {
            type: 'bar',
            data: { labels, datasets: [{ data: income, backgroundColor: income.map(v => v >= 0 ? '#00c853' : '#ff3b30') }] },
            options: commonOptions
        });
    }

    async function submitData() {
        const payload = {
            date: document.getElementById('d-date').value,
            open: document.getElementById('d-open').value,
            close: document.getElementById('d-close').value,
            wallet: document.getElementById('d-wallet').value
        };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert("Record Saved!");
        location.reload();
    }

    window.onload = loadData;
</script>
</body>
</html>
